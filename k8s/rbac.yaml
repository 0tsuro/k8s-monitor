apiVersion: v1
kind: ServiceAccount
metadata:
  name: k8s-monitor-sa
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: k8s-monitor-role
rules:
  - apiGroups: [""]
    resources: ["pods", "services", "nodes"]
    verbs: ["get", "list"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: k8s-monitor-binding
subjects:
  - kind: ServiceAccount
    name: k8s-monitor-sa
    namespace: default
roleRef:
  kind: ClusterRole
  name: k8s-monitor-role
  apiGroup: rbac.authorization.k8s.io